<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - PRERMI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/mobile.css">
    <link rel="manifest" href="manifest.json">
    <style>
        .login-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 2rem;
        }

        .login-container {
            width: 100%;
            max-width: 450px;
        }

        .login-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            animation: slideUp 0.6s ease-out;
        }

        .login-header {
            background: linear-gradient(135deg, #4ecdc4, #44a08d);
            color: white;
            padding: 3rem 2rem;
            text-align: center;
        }

        .login-header h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .login-header i {
            font-size: 2.5rem;
        }

        .login-header p {
            margin: 0;
            opacity: 0.9;
            font-size: 1rem;
        }

        .login-body {
            padding: 3rem 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            font-weight: 600;
            color: #333;
            margin-bottom: 0.7rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-control {
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 12px 15px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            border-color: #4ecdc4;
            box-shadow: 0 0 0 3px rgba(78, 205, 196, 0.1);
            outline: none;
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            background: linear-gradient(135deg, #4ecdc4, #44a08d);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 1rem;
        }

        .btn-login:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(78, 205, 196, 0.3);
        }

        .login-footer {
            text-align: center;
            padding: 2rem;
            border-top: 1px solid #e0e0e0;
            background: #f8f9fa;
        }

        .login-footer p {
            margin: 0;
            color: #666;
        }

        .login-footer a {
            color: #4ecdc4;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .login-footer a:hover {
            color: #44a08d;
            text-decoration: none;
        }

        .back-link {
            color: white;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 2rem;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .back-link:hover {
            gap: 12px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #666;
        }

        .remember-me input {
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-container">
            <a href="/PRERMI/index.php" class="back-link">
                <i class="fas fa-arrow-left"></i> Volver al inicio
            </a>

            <div class="login-card">
                <div class="login-header">
                    <h1>
                        <i class="fas fa-user-circle"></i> Usuario
                    </h1>
                    <p>Acceso a tu cuenta</p>
                </div>

                <div class="login-body">
                    <form id="loginForm">
                        <div class="form-group">
                            <label class="form-label" for="email">
                                <i class="fas fa-user"></i> Usuario
                            </label>
                            <input type="text" class="form-control" id="usuario" name="usuario" 
                                   placeholder="tu_usuario" required>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="password">
                                <i class="fas fa-lock"></i> Contraseña
                            </label>
                            <input type="password" class="form-control" id="password" name="password" 
                                   placeholder="********" required>
                        </div>

                        <div class="remember-me">
                            <input type="checkbox" id="remember" name="remember">
                            <label for="remember">Recuérdame</label>
                        </div>

                        <button type="submit" class="btn-login">
                            <i class="fas fa-sign-in-alt"></i> Iniciar Sesión
                        </button>
                    </form>

                    <div class="alert alert-info" style="margin-top: 1.5rem;">
                        <i class="fas fa-info-circle"></i>
                        <span>¿Olvidaste tu contraseña? <a href="#" style="color: inherit; font-weight: 600;">Recupérala aquí</a></span>
                    </div>
                </div>

                <div class="login-footer">
                    <p>¿No tienes cuenta? 
                        <a href="register.html">
                            Regístrate ahora <i class="fas fa-arrow-right"></i>
                        </a>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').then(function(reg){
                console.log('SW registered', reg.scope);
            }).catch(function(err){
                console.warn('SW registration failed', err);
            });
        }

        // Interceptar formulario y enviar como form-data (compatible con InfinityFree)
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = this.querySelector('.btn-login');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Verificando...';
            btn.disabled = true;

            try {
                const formData = new FormData();
                formData.append('usuario', document.getElementById('usuario').value.trim());
                formData.append('clave', document.getElementById('password').value);

                const resp = await fetch('../api/usuarios/login.php', {
                    method: 'POST',
                    body: formData
                });

                let data;
                const text = await resp.text();
                try {
                    data = JSON.parse(text);
                } catch(parseErr) {
                    // InfinityFree puede devolver HTML en vez de JSON (página de seguridad)
                    if (text.includes('security check') || text.includes('checking your browser')) {
                        alert('El servidor de hosting está verificando tu navegador. Recarga la página e intenta de nuevo.');
                    } else {
                        alert('Error del servidor. Respuesta inesperada.');
                    }
                    console.error('Respuesta no-JSON:', text);
                    return;
                }

                if (data.success) {
                    // Guardar sesión en localStorage
                    if (data.user) {
                        localStorage.setItem('prermi_user', JSON.stringify(data.user));
                    }
                    alert(data.message || 'Login exitoso');
                    window.location.href = 'dashboard.html';
                } else {
                    alert(data.msg || 'Error al iniciar sesión');
                }
            } catch(err) {
                console.error('Error de red:', err);
                alert('Error de conexión. Verifica tu internet e intenta de nuevo.');
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>

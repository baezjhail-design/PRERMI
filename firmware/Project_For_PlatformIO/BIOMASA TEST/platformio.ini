; PlatformIO Project Configuration File - BIOMASA ESP32-S3 CAM
;
; Placa: ESP32-S3 CAM (freenove_esp32_s3_wroom)
; Aplicación: Sistema de control BIOMASA con sensores de temperatura y corriente
;

[env:freenove_esp32_s3_wroom]
platform = espressif32
board = freenove_esp32_s3_wroom
framework = arduino
monitor_speed = 115200
monitor_dtr = 0
monitor_rts = 0

lib_deps = 
	paulstoffregen/OneWire@2.3.7
	bblanchon/ArduinoJson@^7.4.2
	milesburton/DallasTemperature@^4.0.6

build_flags = 
	-DBOARD_ESP32_S3_CAM

; Script para inyectar PYTHONPATH y evitar errores de módulos faltantes
extra_scripts = pre:inject_pythonpath.py
